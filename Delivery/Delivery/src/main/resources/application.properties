spring.application.name=Delivery

# Database connection settings
server.port=1234
spring.datasource.url=jdbc:postgresql://localhost:5432/QuickDrop
spring.datasource.username=postgres
spring.datasource.password=helloworld!

spring.security.debug=true

# ? Enable DEBUG logs for authentication and authorization
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.web=DEBUG
logging.level.org.springframework.security.authentication=DEBUG
logging.level.org.springframework.security.authorization=DEBUG

# ? Enable DEBUG for JWT parsing (jjwt library)
logging.level.io.jsonwebtoken=DEBUG

# JPA settings (optional but useful)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Redis Configuration
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.password=helloworld!


#kafka properties
spring.kafka.producer.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

#kafka consumer
#KafkaConfig consumer
spring.kafka.consumer.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id="order-consume"
spring.kafka.consumer.auto-offset-reset=latest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

#mongoDb setup
spring.data.mongodb.uri=mongodb://localhost:27017/deliveryBoy
spring.data.mongodb.database=deliveryBoy
logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG


